name: car
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^4.2.1
  firebase_auth: ^6.1.2
  http: ^1.6.0
  dio: ^5.9.0
  shared_preferences: ^2.5.4
  cloud_firestore: ^6.1.0
  fl_chart: ^1.1.1
  intl: ^0.20.2
  url_launcher: ^6.3.2
  image_picker:
  firebase_storage:
  lottie: ^3.1.0
  confetti: ^0.7.0
  razorpay_flutter: ^1.3.7
  cloudinary_public: ^0.21.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

# 👇 THIS MUST BE OUTSIDE dependencies
flutter_icons:
  android: true
  ios: true
  image_path: "asset/image/logo.png"

flutter:
  uses-material-design: true

  assets:
    - asset/image/logo.png
